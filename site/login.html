<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sign in · Generation Faraday</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0}body{font-family:"Poppins",system-ui,sans-serif;background:#0E0E0E;color:#1A1A1A;
min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.card{background:#fff;border-radius:18px;box-shadow:0 30px 80px rgba(0,0,0,.4);width:100%;max-width:380px;padding:34px 30px}
.logo{display:block;height:34px;margin:0 auto 22px}
h1{font-size:1.35rem;font-weight:800;text-align:center;margin-bottom:4px}
.sub{text-align:center;color:#888;font-size:.9rem;margin-bottom:22px}
label{display:block;font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#999;margin:14px 0 6px}
input{width:100%;border:1px solid #ddd;border-radius:10px;padding:12px;font:15px "Poppins";outline:none}
input:focus{border-color:#E04A2C}
button{width:100%;margin-top:22px;background:#E04A2C;color:#fff;border:0;border-radius:10px;padding:13px;font:700 15px "Poppins";cursor:pointer}
button:hover{background:#B83A1F}button:disabled{opacity:.6;cursor:default}
.err{background:#fdecec;color:#c0392b;font-size:.85rem;padding:10px 12px;border-radius:9px;margin-top:16px;display:none}
.foot{text-align:center;color:#aaa;font-size:.78rem;margin-top:18px}
</style></head>
<body>
<form class="card" id="f">
  <img class="logo" src="/genf-logo.png" alt="Generation Faraday">
  <h1>Sign in</h1>
  <div class="sub">Generation Faraday review site</div>
  <label>Email</label>
  <input id="email" type="email" autocomplete="username" required autofocus>
  <label>Password</label>
  <input id="password" type="password" autocomplete="current-password" required>
  <button id="btn" type="submit">Sign in</button>
  <div class="err" id="err"></div>
  <div class="foot">Need access? Ask an admin to invite you.</div>
</form>
<script>
var f=document.getElementById('f'),err=document.getElementById('err'),btn=document.getElementById('btn');
var next=new URLSearchParams(location.search).get('next')||'/';
f.onsubmit=function(e){e.preventDefault();err.style.display='none';btn.disabled=true;btn.textContent='Signing in…';
  fetch('/api/app?action=login',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({email:email.value.trim(),password:password.value})})
  .then(function(r){return r.json().then(function(d){return{ok:r.ok,d:d}})})
  .then(function(x){if(x.ok){location.href=next;}else{throw new Error(x.d.error||'Login failed')}})
  .catch(function(e){err.textContent=e.message;err.style.display='block';btn.disabled=false;btn.textContent='Sign in';});
};
</script>
</body></html>
